    <main>
      <section class="fv">
        <div class="fv__img">

          <p class="info__schedule-date">2021 JUL 1(THU)-3(SAT)</p>
          <p class="info__schedule-time">DAY1 10am-6pm OTHER 10am-5:30pm</p>

        <div class="gallery__inner">
          <div class="gallery__item gallery__item--left">
